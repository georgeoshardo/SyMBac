[workspace]
name = "symbac-dev"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[dependencies]
python = ">=3.11,<3.13"
numpy = "<2.5"
pytest = ">=9.0.2,<10"
dask = ">=2026.1.2,<2027"

[pypi-dependencies]
symbac = { path = ".", editable = true }
geff = ">=1.1.4.1.1, <2"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[environments]
py311 = ["py311"]
py312 = ["py312"]
